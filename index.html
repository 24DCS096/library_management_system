<!DOCTYPE html>
<html>
<head>
    <title>Login</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg">

<div class="container">
    <h2>Library System</h2>

    <input type="text" id="username" placeholder="Username">

    <button onclick="login()">Login</button>

<script src="script.js"></script>
</body>
</html>
